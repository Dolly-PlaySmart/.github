name: Reusable CI / Unity

on:
  workflow_call:
    inputs:
      unity-version:
        description: Unity version. Leave empty to auto-detect from ProjectSettings/ProjectVersion.txt.
        type: string
        default: ""
      project-path:
        description: Path to the Unity project root (must contain ProjectSettings/).
        type: string
        default: "."
      run-tests:
        description: Run unity-test-runner.
        type: boolean
        default: true
      test-mode:
        description: editmode, playmode, or all.
        type: string
        default: "editmode"
      run-build:
        description: Run unity-builder to validate compilation.
        type: boolean
        default: true
      target-platform:
        description: Build target. StandaloneLinux64 is fastest for compile-only validation.
        type: string
        default: "StandaloneLinux64"
      lfs:
        description: Pull Git LFS objects on checkout.
        type: boolean
        default: true
    secrets:
      UNITY_EMAIL:
        required: true
      UNITY_PASSWORD:
        required: true
      UNITY_SERIAL:
        required: true
      GH_TOKEN:
        description: PAT used to fetch private UPM packages from other Dolly-PlaySmart repos.
        required: false

concurrency:
  group: ci-unity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: ${{ inputs.run-tests }}
    name: Tests (${{ inputs.test-mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: ${{ inputs.lfs }}
          fetch-depth: 0

      - uses: actions/cache@v4
        with:
          path: ${{ inputs.project-path }}/Library
          key: Library-test-${{ inputs.target-platform }}-${{ hashFiles(format('{0}/Assets/**', inputs.project-path), format('{0}/Packages/**', inputs.project-path), format('{0}/ProjectSettings/**', inputs.project-path)) }}
          restore-keys: |
            Library-test-${{ inputs.target-platform }}-
            Library-

      - uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ inputs.unity-version || 'auto' }}
          projectPath: ${{ inputs.project-path }}
          testMode: ${{ inputs.test-mode }}
          artifactsPath: test-results
          gitPrivateToken: ${{ secrets.GH_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unity-test-results-${{ inputs.test-mode }}
          path: test-results

  build:
    if: ${{ inputs.run-build }}
    name: Build (${{ inputs.target-platform }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: ${{ inputs.lfs }}
          fetch-depth: 0

      - uses: actions/cache@v4
        with:
          path: ${{ inputs.project-path }}/Library
          key: Library-build-${{ inputs.target-platform }}-${{ hashFiles(format('{0}/Assets/**', inputs.project-path), format('{0}/Packages/**', inputs.project-path), format('{0}/ProjectSettings/**', inputs.project-path)) }}
          restore-keys: |
            Library-build-${{ inputs.target-platform }}-
            Library-

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ inputs.unity-version || 'auto' }}
          projectPath: ${{ inputs.project-path }}
          targetPlatform: ${{ inputs.target-platform }}
          allowDirtyBuild: true
