name: Reusable CI / Node

on:
  workflow_call:
    inputs:
      bun-version:
        description: Bun version to install. Pinned per repo for reproducibility.
        type: string
        default: "1.3.11"
      working-directory:
        description: Directory containing package.json. Use the repo root for monorepos.
        type: string
        default: "."
      run-typecheck:
        description: Run "bun run typecheck" if the script exists.
        type: boolean
        default: true
      run-tests:
        description: Run "bun run test".
        type: boolean
        default: true
      mongodb:
        description: Start a MongoDB 7 container on localhost:27017 before tests.
        type: boolean
        default: false
      mongoms-version:
        description: Version key for the mongodb-memory-server cache. Bump when changing the binary.
        type: string
        default: "7.0.5"
      test-env:
        description: Multi-line "KEY=value" pairs exported before the test step. Use for non-secret env.
        type: string
        default: ""

concurrency:
  group: ci-node-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    if: ${{ inputs.run-typecheck }}
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ${{ inputs.working-directory }}/node_modules
            ${{ inputs.working-directory }}/*/node_modules
          key: ${{ runner.os }}-bun-${{ inputs.bun-version }}-${{ inputs.working-directory }}-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory), format('{0}/bun.lockb', inputs.working-directory)) }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ inputs.bun-version }}-${{ inputs.working-directory }}-

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: |
          if jq -e '.scripts.typecheck' package.json >/dev/null; then
            bun run typecheck
          else
            echo "No 'typecheck' script in package.json — skipping"
          fi

  test:
    if: ${{ inputs.run-tests }}
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ${{ inputs.working-directory }}/node_modules
            ${{ inputs.working-directory }}/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory), format('{0}/bun.lockb', inputs.working-directory)) }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache mongodb-memory-server binaries
        if: ${{ inputs.mongodb }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: ${{ runner.os }}-mongoms-${{ inputs.mongoms-version }}

      - name: Start MongoDB
        if: ${{ inputs.mongodb }}
        run: |
          docker run -d --name mongo \
            -e MONGO_INITDB_ROOT_USERNAME=admin \
            -e MONGO_INITDB_ROOT_PASSWORD=admin \
            -p 27017:27017 \
            mongo:7
          for i in $(seq 1 30); do
            if docker exec mongo mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' >/dev/null 2>&1; then
              echo "MongoDB ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "MongoDB did not become ready in 30s"
          docker logs mongo
          exit 1

      - name: Install dependencies
        run: bun install

      - name: Export test-env
        if: ${{ inputs.test-env != '' }}
        run: |
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "$line" >> "$GITHUB_ENV"
          done <<'EOF'
          ${{ inputs.test-env }}
          EOF

      - name: Run tests
        run: bun run test
